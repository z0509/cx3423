          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Download Bot and Create run.bat
        run: |
          $desktopPath = [Environment]::GetFolderPath("Desktop")
          $botPath = Join-Path $desktopPath "bot.py"
          $batPath = Join-Path $desktopPath "run.bat"
          
          # تحميل bot.py من الرابط
          $fileId = "1SSIKOB0wXz03qUDA0dd3VIQ_4-n5D4yx"
          $downloadUrl = "https://drive.usercontent.google.com/download?id=$fileId&export=download&confirm=t"
          Invoke-WebRequest -Uri $downloadUrl -OutFile $botPath -UseBasicParsing
          
          # إنشاء ملف run.bat
          @"
@echo off
python bot.py
"@ | Out-File -FilePath $batPath -Encoding ASCII
          
          # التأكد من وجود الملفات
          if ((Test-Path $botPath) -and (Test-Path $batPath)) {
              echo "BOT_PATH=$botPath" >> $env:GITHUB_ENV
              echo "BAT_PATH=$batPath" >> $env:GITHUB_ENV
          } else {
              Write-Error "فشل تحميل الملفات"
              exit 1
          }

      - name: Run Bot
        run: |
          $batPath = "$env:BAT_PATH"
          if (-not $batPath) {
              $desktopPath = [Environment]::GetFolderPath("Desktop")
              $batPath = Join-Path $desktopPath "run.bat"
          }
          
          # تشغيل run.bat في الخلفية
          Start-Process -FilePath $batPath -WindowStyle Hidden
          
          # الانتظار قليلاً والتأكد من تشغيل البوت
          Start-Sleep -Seconds 5

      - name: Keep Alive
        run: |
          $endTime = (Get-Date).AddHours(6)
          while ((Get-Date) -lt $endTime) {
              Start-Sleep -Seconds 300
          }
