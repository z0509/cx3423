          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i `"$installerPath`" /quiet /norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Connect Tailscale
        run: |
          $tsPath = "C:\Program Files\Tailscale\tailscale.exe"
          if (-not (Test-Path $tsPath)) { $tsPath = "C:\Program Files (x86)\Tailscale\tailscale.exe" }
          $authKey = "tskey-auth-kdo6rTZUhZ11CNTRL-fYjtg3XE58MVxL4WktbA8MMYfhS2jsaA7"
          & $tsPath up --authkey=$authKey --hostname=rdp-server-${{ matrix.server }} | Out-Null
          $tsIP = $null
          $retries = 0
